<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Concorde Policy Mapper{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex" x-data="sidebarApp()">

  <aside class="w-72 bg-white border-r border-gray-200 min-h-screen flex flex-col fixed left-0 top-0 overflow-y-auto">
    <div class="p-4 border-b border-gray-200">
      <h1 class="text-lg font-bold text-gray-900">Concorde</h1>
      <p class="text-xs text-gray-500">Policy Mapper</p>
      <a href="/run" class="mt-3 block w-full text-center bg-indigo-600 text-white text-sm font-medium px-4 py-2 rounded-lg hover:bg-indigo-700">
        + New Run
      </a>
    </div>

    <div class="p-4 flex-1">
      <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Runs</h2>
      {% if runs %}
      <ul class="space-y-1">
        {% for run in runs %}
        <li class="flex items-center gap-2 group">
          <input type="checkbox" :value="'{{ run.name }}'" x-model="selectedRuns"
                 class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500" />
          <a href="/runs/{{ run.name }}"
             class="flex-1 block px-2 py-1.5 rounded text-sm {% if active_run == run.name %}bg-indigo-50 text-indigo-700 font-medium{% else %}text-gray-700 hover:bg-gray-100{% endif %}">
            <span class="block font-medium truncate">{{ run.name }}</span>
            <span class="block text-xs text-gray-500">{{ run.risk_count }} risks</span>
          </a>
        </li>
        {% endfor %}
      </ul>

      <template x-if="selectedRuns.length >= 2">
        <a :href="'/compare?runs=' + selectedRuns.join(',')"
           class="mt-4 block w-full text-center bg-emerald-600 text-white text-sm font-medium px-4 py-2 rounded-lg hover:bg-emerald-700">
          Compare Selected (<span x-text="selectedRuns.length"></span>)
        </a>
      </template>
      {% else %}
      <p class="text-sm text-gray-500">No runs found.</p>
      {% endif %}
    </div>
  </aside>

  <main class="ml-72 flex-1 p-8">
    {% block content %}{% endblock %}
  </main>

  <script>
    function sidebarApp() {
      return { selectedRuns: [] };
    }
  </script>
</body>
</html>
